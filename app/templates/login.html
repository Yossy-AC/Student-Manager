{% extends "base.html" %}

{% block title %}ログイン - 塾成績管理システム{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2>塾成績管理システム</h2>
        <p class="login-subtitle">ログイン</p>

        <form method="post" action="/auth/login">
            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" placeholder="パスワードを入力" required autofocus>
            </div>

            <button type="submit" class="btn btn-primary btn-full">ログイン</button>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
        </form>
    </div>
</div>

<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
    }

    .login-card {
        background: var(--p-surface);
        padding: 2.5rem;
        border-radius: var(--p-radius-lg);
        border: 0.5px solid var(--p-border-light);
        box-shadow: var(--p-card-shadow);
        width: 100%;
        max-width: 400px;
    }

    .login-card h2 {
        text-align: center;
        margin-bottom: 0.5rem;
        color: var(--p-text);
    }

    .login-subtitle {
        text-align: center;
        color: var(--p-text-secondary);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
    }

    .btn-full {
        width: 100%;
        padding: 0.75rem;
        margin-top: 1rem;
    }

    @media (max-width: 600px) {
        .login-card {
            margin: 1rem;
        }
    }
</style>
{% endblock %}
