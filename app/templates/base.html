<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}塾成績管理システム{% endblock %}</title>
    <base href="{{ base_href | default('/') }}">
    <script>
    (function(){var t=localStorage.getItem("portal-theme");if(!t)t=window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t)})();
    </script>

    <!-- Portal Design System -->
    <link rel="stylesheet" href="/portal-assets/portal.css">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe0NjP5+9Ngsy9SAJlsylVp4guJCOdKNLcO9" crossorigin="anonymous"></script>

    <!-- App CSS -->
    <link rel="stylesheet" href="static/css/styles.css">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Portal Navigation -->
    <nav class="portal-nav">
        <div class="portal-nav-inner">
            <a href="/" class="portal-nav-brand"><img src="/portal-assets/logo-penguin.svg" alt="Yossy Portal" class="portal-nav-icon"></a>
            <ul class="portal-nav-links">
                <li><a href="/">ホーム</a></li>
                <li><a href="admin">管理画面</a></li>
                <li><a href="dashboard">ダッシュボード</a></li>
                <li><a href="upload">アップロード</a></li>
                <li><a href="/auth/logout" class="portal-nav-logout">ログアウト</a></li>
            </ul>
            <button class="portal-theme-toggle" aria-label="テーマ切替">&#9790;</button>
            <button class="portal-hamburger" aria-label="メニュー" aria-expanded="false">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"/></svg>
            </button>
        </div>
    </nav>
    <div class="portal-mobile-menu">
        <a href="/">ホーム</a>
        <a href="admin">管理画面</a>
        <a href="dashboard">ダッシュボード</a>
        <a href="upload">アップロード</a>
        <a href="/auth/logout" class="portal-nav-logout">ログアウト</a>
    </div>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="portal-footer">&copy; 2026 Yossy Portal</footer>

    <script src="/portal-assets/portal-nav.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
