{% extends "base.html" %}

{% block title %}CSVアップロード - 塾成績管理システム{% endblock %}

{% block content %}
<div class="upload-container">
    <h1>CSVアップロード</h1>

    <div class="upload-section">
        <h2>ファイルを選択</h2>
        <form id="upload-form"
              hx-post="api/upload/csv"
              hx-target="#preview-area"
              hx-swap="innerHTML"
              hx-encoding="multipart/form-data">

            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" name="file" accept=".csv" style="display: none;">
                <div class="upload-icon">📁</div>
                <p>ファイルをドラッグ&amp;ドロップ または クリックして選択</p>
                <button type="button" class="btn btn-primary" onclick="document.getElementById('file-input').click();">
                    ファイル選択
                </button>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                アップロード
            </button>
        </form>

        <span id="upload-indicator" class="htmx-indicator" style="margin-left: 1rem;">解析中...</span>
    </div>

    <!-- CSV 解析後のプレビューがここに差し込まれる -->
    <div id="preview-area"></div>

    <div class="template-section">
        <h3>CSVテンプレート</h3>
        <p>テンプレートのダウンロードは Phase 4 で実装予定です</p>
    </div>
</div>

<style>
    .upload-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
    }

    .upload-container h1 {
        margin-bottom: 2rem;
        color: #333;
    }

    .upload-section {
        margin-bottom: 2rem;
        padding: 2rem;
        background: #f9f9f9;
        border-radius: 8px;
    }

    .upload-section h2 {
        margin-top: 0;
        margin-bottom: 1.5rem;
        color: #333;
    }

    .upload-area {
        border: 2px dashed #ccc;
        border-radius: 8px;
        padding: 3rem 2rem;
        text-align: center;
        background: white;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .upload-area:hover {
        border-color: #667eea;
        background: #f0f2ff;
    }

    .upload-area.dragover {
        border-color: #667eea;
        background: #f0f2ff;
    }

    .upload-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
    }

    .upload-area p {
        margin: 0.5rem 0;
        color: #666;
    }

    .template-section {
        padding: 1.5rem;
        background: #f9f9f9;
        border-radius: 8px;
        margin-top: 2rem;
    }

    .template-section h3 {
        margin-top: 0;
        color: #333;
    }
</style>

<script>
    const uploadArea = document.getElementById('upload-area');
    const fileInput = document.getElementById('file-input');

    // ドラッグ&ドロップイベント
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        uploadArea.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, unhighlight, false);
    });

    function highlight(e) {
        uploadArea.classList.add('dragover');
    }

    function unhighlight(e) {
        uploadArea.classList.remove('dragover');
    }

    uploadArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        fileInput.files = files;
    }

    // クリックでファイル選択ダイアログを開く
    uploadArea.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        if (fileInput.files.length > 0) {
            document.getElementById('upload-form').submit();
        }
    });
</script>
{% endblock %}
